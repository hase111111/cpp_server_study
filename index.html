<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C++ Frontend Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #f8fafc;
      }
      .container {
        max-width: 760px;
        margin: 80px auto;
        padding: 32px;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.85);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      }
      h1 {
        margin-top: 0;
        font-size: 2rem;
      }
      p {
        line-height: 1.7;
        color: #cbd5e1;
      }
      button {
        background: #38bdf8;
        border: none;
        color: white;
        padding: 12px 18px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 1rem;
        margin-top: 12px;
      }
      button:hover {
        background: #0ea5e9;
      }
      #message {
        margin-top: 16px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>こんにちは！</h1>
      <p>これは C++ サーバーが返す最小のフロントエンドです。</p>
      <p>ローカルホストで表示できるように、index.html をそのまま返しています。</p>
      <button onclick="showMessage()">クリックしてみて</button>
      <div id="message"></div>
    </div>

    <script>
      function showMessage() {
        document.getElementById('message').textContent = 'C++ から配信中のページです！';
      }
    </script>
  </body>
</html>
